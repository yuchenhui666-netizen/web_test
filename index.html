<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喻晨辉 - 个人技术仓库</title> <!-- 标题强化「技术仓库」，突出个人属性 -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-decoration"></div>
    
    <div class="container">
        <header class="hero-section">
            <div class="avatar-placeholder">
                <span>喻</span> <!-- 替换图标为姓氏，强化个人专属标识 -->
            </div>
            <h1 class="name-title">喻晨辉</h1> <!-- 简化标题，只保留名字，视觉更聚焦 -->
            <p class="subtitle">个人技术仓库 & 数字作品集</p> <!-- 副标题明确「仓库/作品集」定位 -->
            <div class="divider"></div>
        </header>

        <!-- 内容卡片聚焦「个人仓库/项目」，弱化通用化表述 -->
        <section class="content-section">
            <div class="info-card">
                <div class="card-icon"><i class="fas fa-folder-open"></i></div> <!-- 替换图标为「文件夹」，贴合仓库属性 -->
                <h2>我的仓库</h2>
                <p>托管我的开源项目、学习笔记与实战代码。</p>
                <p>记录技术成长的每一步，保持开源与分享的初心。</p>
            </div>

            <div class="info-card">
                <div class="card-icon"><i class="fas fa-laptop-code"></i></div> <!-- 替换图标为「代码笔记本」，更贴合技术探索 -->
                <h2>技术方向</h2>
                <p>人工智能 / 全栈开发 / 创意设计</p>
                <p>持续探索技术边界，沉淀可落地的实践成果。</p>
            </div>
        </section>

        <!-- 社交链接聚焦「个人技术账号」，替换为更贴合国内的平台，标注占位提示 -->
        <footer class="social-links">
            <a href="https://github.com/你的用户名" class="social-btn" title="我的GitHub仓库" target="_blank"><i class="fab fa-github"></i></a>
            <a href="mailto:你的邮箱@xxx.com" class="social-btn" title="联系我" target="_blank"><i class="fas fa-envelope"></i></a>
            <a href="https://gitee.com/你的用户名" class="social-btn" title="我的Gitee仓库" target="_blank"><i class="fab fa-git"></i></a> <!-- 替换Twitter为Gitee，更贴合国内场景 -->
        </footer>

        <div class="footer-text">
            &copy; 2025 喻晨辉 · 个人技术仓库 | 所有代码仅作个人展示使用
        </div>
    </div>

    <script>
        // 移除卡片点击缩放（避免「可交互/招募」暗示），保留hover的自然动效即可
        // 如需保留轻量交互，可取消以下注释（建议删除，纯展示更贴合需求）
        /*
        document.querySelectorAll('.info-card').forEach(card => {
            card.addEventListener('click', function() {
                this.style.transform = 'scale(0.98)';
                setTimeout(() => {
                    this.style.transform = '';
                }, 150);
            });
        });
        */
    </script>
</body>
</html>
